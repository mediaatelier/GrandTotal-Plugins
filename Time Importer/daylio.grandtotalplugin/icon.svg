<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Äußerer Ring (Fortschrittskreis) -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#e0e7ff" stroke-width="2.5"/>
  <!-- Fortschrittsanzeige (ca. 75% gefüllt) -->
  <path d="M 16 2 A 14 14 0 1 1 2 16"
        fill="none"
        stroke="url(#favGradient)"
        stroke-width="2.5"
        stroke-linecap="round"/>
  <!-- Innerer Kreis -->
  <circle cx="16" cy="16" r="10" fill="url(#favGradient)"/>
  <!-- Uhrzeiger -->
  <line x1="16" y1="16" x2="16" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="22" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mittelpunkt -->
  <circle cx="16" cy="16" r="2" fill="white"/>
</svg>
